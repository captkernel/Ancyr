<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
<defs>
  <radialGradient id="bg" cx="38%" cy="25%" r="78%">
    <stop offset="0%" stop-color="#201C18"/>
    <stop offset="60%" stop-color="#0E0C08"/>
    <stop offset="100%" stop-color="#0E0C08" stop-opacity="0.8"/>
  </radialGradient>
  <linearGradient id="fab" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#504540"/>
    <stop offset="18%" stop-color="#3C3428"/>
    <stop offset="52%" stop-color="#2C241A"/>
    <stop offset="82%" stop-color="#1C1610"/>
    <stop offset="100%" stop-color="#0A0806"/>
  </linearGradient>
  <linearGradient id="foldL" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0A0806" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#0A0806" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="foldR" x1="100%" y1="0%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#0A0806" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#0A0806" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="foldM" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0A0806" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#0A0806" stop-opacity="0.06"/>
  </linearGradient>
  <linearGradient id="spec" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#504540" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#504540" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="floor" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="rgba(0,0,0,0.28)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </radialGradient>
  <pattern id="wp" width="6" height="6" patternUnits="userSpaceOnUse">
  <rect width="6" height="6" fill="#322A20"/>
  <rect x="0" y="0" width="3" height="1.2" fill="#181410" opacity="0.55"/>
  <rect x="3" y="3" width="3" height="1.2" fill="#181410" opacity="0.55"/>
  <rect x="0" y="0" width="1.2" height="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="3" y="3" width="1.2" height="3" fill="rgba(255,255,255,0.08)"/>
</pattern>
  <filter id="grain" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
  <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="n"/>
  <feColorMatrix in="n" type="saturate" values="0" result="g"/>
  <feBlend in="SourceGraphic" in2="g" mode="soft-light" result="b"/>
  <feComposite in="b" in2="SourceGraphic" operator="in"/>
</filter> <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter> <radialGradient id="vign" cx="50%" cy="50%" r="70%" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
  <stop offset="68%" stop-color="rgba(0,0,0,0)"/>
  <stop offset="100%" stop-color="rgba(0,0,0,0.48)"/>
</radialGradient>
</defs>
<!-- Background - studio seamless sweep -->
<rect width="600" height="800" fill="url(#bg)"/>
<!-- Floor plane slightly darker -->
<rect y="640" width="600" height="160" fill="#0E0C08" opacity="0.25"/>
<!-- Soft shadow on floor -->
<ellipse cx="300" cy="762" rx="158" ry="24" fill="rgba(0,0,0,0.22)" filter="url(#blur)"/>
<!-- Fabric main shape - natural drape with gentle width variation -->
<path id="D" d="M 158,0 C 152,68 140,145 145,238 C 150,331 133,412 121,498 C 109,584 106,652 114,724 C 119,768 127,788 126,800 L 474,800 C 473,788 481,768 486,724 C 494,652 491,584 479,498 C 467,412 450,331 455,238 C 460,145 448,68 442,0 Z"/>
<!-- Base fabric colour + gradient -->
<use href="#D" fill="url(#fab)"/>
<!-- Woven textile texture overlay -->
<use href="#D" fill="url(#wp)" opacity="0.32"/>
<!-- Left fold shadow -->
<path d="M 202,0 C 197,84 191,165 187,256 C 183,347 181,428 185,518 C 189,598 196,668 198,800 L 244,800 C 242,668 235,598 231,518 C 227,428 229,347 233,256 C 237,165 235,84 231,0 Z" fill="url(#foldM)"/>
<!-- Right fold shadow -->
<path d="M 382,0 C 379,82 377,174 379,268 C 381,358 383,444 385,532 C 387,618 387,690 385,800 L 428,800 C 426,690 426,618 427,532 C 428,444 427,358 423,268 C 419,174 417,82 415,0 Z" fill="url(#foldM)"/>
<!-- Left edge fold (stronger) -->
<path d="M 158,0 C 152,68 140,145 145,238 C 150,331 133,412 121,498 L 192,498 C 178,412 178,331 176,238 C 174,145 174,68 175,0 Z" fill="url(#foldL)"/>
<!-- Right edge fold -->
<path d="M 442,0 C 448,68 460,145 455,238 C 450,331 467,412 479,498 L 408,498 C 422,412 422,331 424,238 C 426,145 426,68 425,0 Z" fill="url(#foldR)"/>
<!-- Specular highlight - main catch light upper left -->
<path d="M 250,0 C 248,62 246,130 249,208 C 251,252 256,285 264,312 L 295,295 C 290,268 286,236 284,192 C 281,118 278,52 275,0 Z" fill="url(#spec)"/>
<!-- Secondary specular sparkle -->
<path d="M 310,120 C 318,148 322,185 320,218 L 336,214 C 337,180 333,142 326,114 Z" fill="#504540" opacity="0.12"/>
<!-- Film grain overlay -->
<rect width="600" height="800" fill="rgba(90,80,65,0.04)" filter="url(#grain)"/>
<!-- Vignette -->
<rect width="600" height="800" fill="url(#vign)"/>
</svg>